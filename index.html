<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nova Login</title>

    <link rel="stylesheet" href="insta.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>

<div class="container">

    <div class="language">
        English (UK)
    </div>

    <div class="logo">
        <img src="insta.png" alt="Logo">
    </div>

    <div class="login">

        <input type="text" id="username" placeholder="Username, email or mobile number">

        <input type="password" id="password" placeholder="Password">

        <button id="loginBtn">
            Log In
        </button>

        <a href="#">Forgotten password?</a>

    </div>

    <div class="bottom">

        <button class="create">
            Create New Account
        </button>

        <div class="meta">
            ♾️ Meta
        </div>

    </div>

</div>

<script src="insta.js"></script>

</body>
</html>
